<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoWatch Tower</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Inter",sans-serif; }
body { height:100vh; background:#000; color:white; overflow:hidden; }

/* ================= GLOW ================= */
.glow { position:absolute; top:50%; left:50%; width:1000px; height:600px; transform:translate(-50%,-50%); background:radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.25) 40%, transparent 80%); filter:blur(140px); animation:breathe 6s ease-in-out infinite; }
@keyframes breathe { 0%,100% { transform:translate(-50%, -50%) scale(1); opacity:0.35;} 50%{ transform:translate(-50%, -50%) scale(1.1); opacity:0.5;}}

/* ================= LAYOUT ================= */
.container { display:flex; height:100vh; position:relative; z-index:2; }

/* ================= LEFT LOGIN ================= */
.left { width:40%; display:flex; align-items:center; justify-content:center; padding:60px; }
.login { width:100%; max-width:420px; }
.login h1 { font-size:34px; margin-bottom:8px; }
.login p { font-size:13px; color:#aaa; margin-bottom:30px; letter-spacing:1px; }

.login input {
  width:100%;
  padding:16px;
  margin-bottom:6px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
  font-size:14px;
  transition:0.3s;
}
.login input:focus { border-color:white; box-shadow:0 0 14px rgba(255,255,255,0.35); }

/* 🔴 ERROR TEXT */
.error {
  font-size:12px;
  color:#ff4d4f;
  margin-bottom:12px;
  opacity:0;
  transform:translateY(-5px);
  transition:0.25s ease;
}
.error.show {
  opacity:1;
  transform:translateY(0);
}

/* 🔴 ERROR BORDER */
input.error-border {
  border-color:#ff4d4f !important;
  box-shadow:0 0 10px rgba(255,77,79,0.4);
}

.login button { width:100%; padding:16px; border-radius:12px; border:none; background:white; color:black; font-weight:600; cursor:pointer; transition:0.3s; }
.login button:hover { transform:translateY(-2px); box-shadow:0 10px 40px rgba(255,255,255,0.2); }

/* ================= RIGHT STREAM ================= */
.right { width:60%; padding:60px 80px; display:flex; justify-content:center; align-items:center; position:relative; }
.stream-wrapper { position:relative; width:100%; max-width:600px; height:70vh; overflow-y:auto; padding-left:40px; }
.stream-wrapper::-webkit-scrollbar { display:none; }
.stream-wrapper::before { content:""; position:absolute; left:10px; top:0; width:2px; height:100%; background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.4), transparent);}
.stream-wrapper::after { content:""; position:absolute; left:10px; top:0; width:2px; height:120px; background:linear-gradient(to bottom, transparent, white, transparent); animation:flow 2.5s linear infinite;}
@keyframes flow { from{ transform:translateY(-100px);} to{ transform:translateY(500px);} }

/* STEP */
.step {
  position:relative;
  margin-bottom:30px;
  opacity:0;
  transform:translateY(20px);
  transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}
.step.visible { opacity:1; transform:translateY(0); }
.step.exit { opacity:0; transform:translateY(-40px) scale(0.96); }

.step::before { content:""; position:absolute; left:-34px; top:8px; width:10px; height:10px; border-radius:50%; }
.step.processing::before { background:#aaa; animation:pulse 1.2s infinite; }
.step.success::before { background:#4ade80; }
.step.final::before { background:white; box-shadow:0 0 12px white; }

.card { padding:16px 18px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(10px); position:relative; overflow:hidden; }
.card::after { content:""; position:absolute; inset:0; background:linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent); opacity:0;}
.step.processing .card::after { animation: shimmer 2s infinite;}

@keyframes shimmer { 0% { transform:translateX(-100%); opacity:0; } 50%{ opacity:1;} 100%{ transform:translateX(100%); opacity:0;}}
.title { font-size:14px; color:#eee; }
.meta { font-size:12px; color:#777; margin-top:4px; }
.step.final .card { border-color:rgba(255,255,255,0.3); box-shadow:0 0 20px rgba(255,255,255,0.1);}
@keyframes pulse {0%,100%{opacity:0.3;}50%{opacity:1;}}

.grid { position:absolute; inset:0; opacity:0.03; background-image:radial-gradient(white 1px, transparent 1px); background-size:28px 28px; }

/* ================= TABS ================= */
.tabs { margin-top:12px; }
.tab-buttons { display:flex; gap:8px; margin-bottom:8px; }
.tab-buttons button { flex:1; padding:6px; font-size:11px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#aaa; cursor:pointer;}
.tab-buttons button.active { background:white; color:black; font-weight:600;}
.tab-content { font-size:11px; color:#bbb; line-height:1.5; background:rgba(255,255,255,0.02); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.05); max-height:100px; overflow-y:auto;}

/* ================= ARROWS ================= */
.arrow {
  position:absolute;
  right:20px;
  font-size:24px;
  color:white;
  cursor:pointer;
  user-select:none;
  z-index:5;
  padding:6px;
  background: rgba(255,255,255,0.05);
  border-radius:6px;
  transition:0.2s;
  display:none;
}
.arrow:hover { background: rgba(255,255,255,0.15); }
.top-arrow { top:10px; }
.bottom-arrow { bottom:10px; }
</style>
</head>

<body>

<div class="glow"></div>
<div class="grid"></div>

<div class="container">
  <div class="left">
    <div class="login">
      <h1>GeoWatch Tower</h1>
      <p>GEOSPATIAL INTELLIGENCE | LOGIN SECURITY</p>

      <input id="email" type="email" placeholder="Email">
      <div id="emailError" class="error"></div>

      <input id="password" type="password" placeholder="Password">
      <div id="passwordError" class="error"></div>

      <button onclick="validateAndStart()">Secure Login</button>
    </div>
  </div>

  <div class="right">
    <div class="arrow top-arrow" onclick="prevStep()">&#9650;</div>
    <div class="stream-wrapper" id="stream"></div>
    <div class="arrow bottom-arrow" onclick="nextStep()">&#9660;</div>
  </div>
</div>

<script>

/* ================= VALIDATION ================= */
function validateAndStart(){
  const email = document.getElementById("email");
  const password = document.getElementById("password");

  const emailVal = email.value.trim();
  const passwordVal = password.value.trim();

  const emailError = document.getElementById("emailError");
  const passwordError = document.getElementById("passwordError");

  emailError.textContent = "";
  passwordError.textContent = "";
  emailError.classList.remove("show");
  passwordError.classList.remove("show");
  email.classList.remove("error-border");
  password.classList.remove("error-border");

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

  let valid = true;

  if(!emailRegex.test(emailVal)){
    emailError.textContent = "Invalid email format";
    emailError.classList.add("show");
    email.classList.add("error-border");
    valid = false;
  }

  if(!passwordRegex.test(passwordVal)){
    passwordError.textContent = "Password must be 8+ chars with uppercase, lowercase, number & symbol";
    passwordError.classList.add("show");
    password.classList.add("error-border");
    valid = false;
  }

  if(valid){
    startStream();
  }
}

/* ================= WEB3 LOGIC ================= */

const steps = [
  {
    type:"processing",
    text:"Initializing wallet handshake",
    meta:"EIP-4361 signature request",
    tabs:{
      execution:"Requesting wallet signature\nNonce generation\nUser signing payload\nVerifying signature...",
      nodes:"[NODE] RPC call → eth_requestAccounts\n[WALLET] Signature received\n[VERIFY] ECDSA valid\n[AUTH] Wallet linked",
      chain:"TxHash: 0xA91F...C23\nWallet: 0x7Fa3...91C2\nChainID: 137\nGas: 0.0021 MATIC"
    }
  },
  {
    type:"processing",
    text:"Broadcasting geolocation proof",
    meta:"Decentralized oracle validation",
    tabs:{
      execution:"Collecting geo signals\nCreating zk-proof\nSubmitting oracle request\nAwaiting consensus...",
      nodes:"[ORACLE] Request sent\n[DATA] GPS + IP fused\n[VERIFY] zk-proof valid\n[CONSENSUS] 5/7 nodes agreed",
      chain:"Lat: 13.0827\nLong: 80.2707\nProofHash: 0x9ac3...\nConfidence: 98.4%"
    }
  },
  {
    type:"processing",
    text:"Generating device identity hash",
    meta:"Decentralized fingerprint commitment",
    tabs:{
      execution:"Collecting entropy\nHashing with SHA-256\nSalted commitment\nBroadcasting hash...",
      nodes:"[HASH] 9c4f2a7b...\n[CHECK] Anti-spoof passed\n[NODE] Validated\n[STORE] IPFS pinned",
      chain:"CID: bafkreigh2akisc...\nDeviceHash: 0x9c4f...\nEntropy: 0.91\nNetwork: Polygon"
    }
  },
  {
    type:"success",
    text:"Consensus achieved across nodes",
    meta:"Validator agreement reached",
    tabs:{
      execution:"Aggregating validator votes\nThreshold check\nFinalizing state...",
      nodes:"[VALIDATOR-1] OK\n[VALIDATOR-2] OK\n[VALIDATOR-3] OK\n[FINAL] Consensus reached",
      chain:"Block: 48219321\nConfirmations: 12\nStatus: FINALIZED\nLatency: 2.1s"
    }
  },
  {
    type:"final",
    text:"Identity anchored on-chain",
    meta:"Trust score minted",
    tabs:{
      execution:"Minting identity proof\nAssigning trust score\nLocking session...",
      nodes:"[MINT] Identity NFT created\n[SECURE] Session locked\n[ACCESS] Granted",
      chain:"TokenID: #291\nTrustScore: 97.1%\nNetwork: Polygon\nStatus: VERIFIED"
    }
  }
];

function typeWriter(el, text, speed = 60) {
  return new Promise(resolve => {
    el.innerHTML = "";
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
        el.scrollTop = el.scrollHeight;
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

function createTabs(step,id){
  return `<div class="tabs">
    <div class="tab-buttons">
      <button onclick="switchTab(${id},'execution',this)" class="active">Execution</button>
      <button onclick="switchTab(${id},'nodes',this)">Node Logs</button>
      <button onclick="switchTab(${id},'chain',this)">On-Chain</button>
    </div>
    <div class="tab-content" id="content-${id}"></div>
  </div>`;
}

function createStep(step,index){
  const div=document.createElement("div");
  div.className="step "+step.type;
  div.innerHTML=`<div class="card"><div class="title">${step.text}</div><div class="meta">${step.meta}</div>${createTabs(step,index)}</div>`;
  return div;
}

function switchTab(id,tab,el){
  const container=document.getElementById(`content-${id}`);
  typeWriter(container,steps[id].tabs[tab]);
  el.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

let currentIndex = 0;

async function startStream() {
  const stream = document.getElementById("stream");
  stream.innerHTML = "";
  currentIndex = 0;

  for (let i = 0; i < steps.length; i++) {
    if (stream.children.length === 2) {
      const first = stream.children[0];
      first.classList.add("exit");
      await new Promise(r => setTimeout(r, 450));
      if (first.parentNode) stream.removeChild(first);
    }

    const el = createStep(steps[i], i);
    stream.appendChild(el);

    await new Promise(r => setTimeout(r, 100));
    el.classList.add("visible");

    await typeWriter(document.getElementById(`content-${i}`), steps[i].tabs.execution);

    stream.scrollTo({ top: stream.scrollHeight, behavior: "smooth" });

    currentIndex++;
  }

  document.querySelectorAll(".arrow").forEach(a => a.style.display = "block");

  setTimeout(() => {
    window.location.href = "https://zrex-archive.netlify.app/portfolio#gwt";
  }, 4500);
}

function nextStep(){
  const stream=document.getElementById("stream");

  if(currentIndex < steps.length){
    if(stream.children.length === 2){
      const first=stream.children[0];
      first.classList.add("exit");
      setTimeout(()=>{ if(first.parentNode) stream.removeChild(first); },450);
    }

    const el=createStep(steps[currentIndex],currentIndex);
    stream.appendChild(el);

    setTimeout(()=>el.classList.add("visible"),50);

    typeWriter(document.getElementById(`content-${currentIndex}`), steps[currentIndex].tabs.execution);

    stream.scrollTo({ top:stream.scrollHeight, behavior:"smooth" });

    currentIndex++;
  }
}

function prevStep(){
  const stream=document.getElementById("stream");
  if(currentIndex > 2){
    currentIndex -= 2;
    stream.innerHTML = "";
    for(let i=currentIndex; i<currentIndex+2 && i<steps.length; i++){
      const el=createStep(steps[i],i);
      stream.appendChild(el);
      setTimeout(()=>el.classList.add("visible"),50);
      typeWriter(document.getElementById(`content-${i}`), steps[i].tabs.execution);
    }
    stream.scrollTo({top:stream.scrollHeight, behavior:"smooth"});
  }
}
</script>

</body>
</html>
